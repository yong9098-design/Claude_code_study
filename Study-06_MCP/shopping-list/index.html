<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 24px;
      color: #fff;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 13px;
      opacity: 0.8;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }

    .stat {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area input::placeholder {
      color: #bbb;
    }

    .btn-add {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    .btn-add:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-add:active {
      transform: translateY(0);
    }

    .filter-bar {
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #f0f0f0;
      color: #666;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .list {
      padding: 8px 0;
      min-height: 120px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: #bbb;
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 15px;
    }

    .item {
      display: flex;
      align-items: center;
      padding: 14px 24px;
      gap: 14px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover {
      background: #fafafa;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #bbb;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #d0d0d0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .checkbox:hover {
      border-color: #667eea;
    }

    .item.done .checkbox {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
    }

    .checkbox-check {
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: none;
    }

    .item.done .checkbox-check {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-all;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #ddd;
      font-size: 18px;
      padding: 4px 6px;
      border-radius: 8px;
      transition: all 0.2s;
      line-height: 1;
    }

    .btn-delete:hover {
      color: #e74c3c;
      background: #fff0f0;
    }

    .footer {
      padding: 16px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      font-size: 13px;
      color: #999;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .btn-clear:hover {
      background: #fff0f0;
    }

    .btn-clear:disabled {
      color: #ddd;
      cursor: default;
    }

    .btn-clear:disabled:hover {
      background: none;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: #bbb;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <p class="subtitle">오늘 살 것들을 정리해보세요</p>
      <div class="stats">
        <div class="stat" id="stat-total">전체 0</div>
        <div class="stat" id="stat-done">완료 0</div>
        <div class="stat" id="stat-remain">남은 것 0</div>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="input-item"
        placeholder="아이템 입력 후 Enter 또는 추가 클릭"
        maxlength="50"
      />
      <button class="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('todo', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="list" id="list"><div class="loading">로딩 중...</div></div>

    <div class="footer">
      <span id="footer-info">아이템이 없습니다</span>
      <button class="btn-clear" id="btn-clear" onclick="clearDone()" disabled>완료 항목 삭제</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://gsmgoklacmnxkckvwerb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzbWdva2xhY21ueGtja3Z3ZXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDU1NjcsImV4cCI6MjA5MDMyMTU2N30.wKBny8Wh9zaz8BT0-ZrXaAx0WPynlN5H3dRxm-JauDw';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];
    let currentFilter = 'all';

    const inputEl    = document.getElementById('input-item');
    const listEl     = document.getElementById('list');
    const clearBtn   = document.getElementById('btn-clear');
    const footerInfo = document.getElementById('footer-info');

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('로드 오류:', error);
        return;
      }
      items = data || [];
      render();
    }

    async function addItem() {
      const text = inputEl.value.trim();
      if (!text) { inputEl.focus(); return; }

      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, done: false })
        .select()
        .single();

      if (error) {
        console.error('추가 오류:', error);
        return;
      }
      items.unshift(data);
      inputEl.value = '';
      inputEl.focus();
      render();
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const { error } = await db
        .from('shopping_items')
        .update({ done: !item.done })
        .eq('id', id);

      if (error) {
        console.error('업데이트 오류:', error);
        return;
      }
      item.done = !item.done;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        console.error('삭제 오류:', error);
        return;
      }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.done).map(i => i.id);
      if (doneIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) {
        console.error('삭제 오류:', error);
        return;
      }
      items = items.filter(i => !i.done);
      render();
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function render() {
      const total  = items.length;
      const done   = items.filter(i => i.done).length;
      const remain = total - done;

      document.getElementById('stat-total').textContent  = '전체 ' + total;
      document.getElementById('stat-done').textContent   = '완료 ' + done;
      document.getElementById('stat-remain').textContent = '남은 것 ' + remain;

      footerInfo.textContent = total === 0
        ? '아이템이 없습니다'
        : remain + '개 남음 · ' + done + '개 완료';

      clearBtn.disabled = done === 0;

      const filtered = items.filter(i => {
        if (currentFilter === 'done') return i.done;
        if (currentFilter === 'todo') return !i.done;
        return true;
      });

      if (filtered.length === 0) {
        const msg = currentFilter === 'done' ? '완료된 항목이 없어요'
                  : currentFilter === 'todo' ? '남은 항목이 없어요'
                  : '아이템을 추가해보세요';
        const icon = currentFilter === 'done' ? '✅'
                   : currentFilter === 'todo' ? '📝' : '🛍️';
        listEl.innerHTML = '<div class="empty-state"><div class="icon">' + icon + '</div><p>' + msg + '</p></div>';
        return;
      }

      listEl.innerHTML = filtered.map(item =>
        '<div class="item ' + (item.done ? 'done' : '') + '" id="item-' + item.id + '">' +
          '<div class="checkbox" onclick="toggleItem(' + item.id + ')">' +
            '<span class="checkbox-check">✓</span>' +
          '</div>' +
          '<span class="item-text">' + escapeHtml(item.text) + '</span>' +
          '<button class="btn-delete" onclick="deleteItem(' + item.id + ')" title="삭제">✕</button>' +
        '</div>'
      ).join('');
    }

    loadItems();
  </script>
</body>
</html>
