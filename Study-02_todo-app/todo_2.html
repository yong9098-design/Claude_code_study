<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋 현용의 할일 관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F8F9FA;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    /* Header */
    header {
      text-align: center;
      padding: 24px 0 16px;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #333;
    }

    /* Dashboard */
    #dashboard {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 16px;
    }
    .progress-main {
      margin-bottom: 16px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 8px;
    }
    .progress-bar-wrap {
      background: #E0E0E0;
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: #4A90D9;
      transition: width 0.4s ease, background 0.3s ease;
    }
    .progress-bar-fill.complete { background: #4CAF50; }
    .congrats {
      text-align: center;
      color: #4CAF50;
      font-weight: 600;
      margin-top: 8px;
      font-size: 0.95rem;
    }
    .progress-categories {
      display: flex;
      gap: 12px;
    }
    .cat-progress {
      flex: 1;
      font-size: 0.8rem;
    }
    .cat-progress-label {
      display: flex;
      justify-content: space-between;
      color: #666;
      margin-bottom: 4px;
    }
    .mini-bar-wrap {
      background: #E0E0E0;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .mini-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .mini-bar-fill.work     { background: #2196F3; }
    .mini-bar-fill.personal { background: #4CAF50; }
    .mini-bar-fill.study    { background: #FF9800; }
    .empty-dashboard {
      text-align: center;
      color: #9E9E9E;
      font-size: 0.95rem;
    }

    /* Category tabs */
    #category-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    #category-tabs button {
      flex-shrink: 0;
      padding: 8px 16px;
      border: 2px solid #E0E0E0;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      color: #555;
      transition: all 0.2s;
    }
    #category-tabs button.active {
      border-color: #4A90D9;
      background: #4A90D9;
      color: #fff;
    }
    #category-tabs button:hover:not(.active) {
      border-color: #4A90D9;
      color: #4A90D9;
    }

    /* Input area */
    #input-area {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    #task-input {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 2px solid #E0E0E0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #task-input:focus { border-color: #4A90D9; }
    #category-select {
      padding: 10px 12px;
      border: 2px solid #E0E0E0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      cursor: pointer;
      background: #fff;
    }

    /* 완료일 입력 (추가 시) */
    .input-due-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      margin-top: 2px;
    }
    .input-due-wrap label {
      font-size: 0.85rem;
      color: #666;
      white-space: nowrap;
    }
    #due-date-input {
      flex: 1;
      padding: 8px 10px;
      border: 2px solid #E0E0E0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      background: #fff;
      color: #333;
      transition: border-color 0.2s;
    }
    #due-date-input:focus { border-color: #4A90D9; }

    #add-btn {
      padding: 10px 20px;
      background: #4A90D9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #add-btn:hover { background: #357ABD; }
    #auto-hint {
      width: 100%;
      font-size: 0.8rem;
      color: #4A90D9;
      min-height: 1.2em;
      padding: 2px 4px;
    }

    /* Task list */
    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .task-item {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      padding: 10px 14px 10px 16px;
      transition: opacity 0.3s ease;
    }
    .task-item.completed { opacity: 0.6; }

    /* 상단 행: 체크박스 + 텍스트 + 뱃지 + 삭제 */
    .task-main-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .task-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-text {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      cursor: pointer;
      word-break: break-all;
    }
    .task-text.overdue {
      color: #E53935;
      font-weight: 600;
    }
    .task-item.completed .task-text {
      color: #9E9E9E;
      text-decoration: line-through;
    }
    .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 2px solid #4A90D9;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }
    .category-badge {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
    }
    .category-badge.work     { background: #2196F3; }
    .category-badge.personal { background: #4CAF50; }
    .category-badge.study    { background: #FF9800; }

    .btn-delete {
      flex-shrink: 0;
      background: #EF5350;
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: #C62828; }

    /* 하단 행: 완료일 */
    .task-date-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #F0F0F0;
    }
    .task-date-row label {
      font-size: 0.78rem;
      color: #888;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .task-date-input {
      padding: 4px 8px;
      border: 1.5px solid #E0E0E0;
      border-radius: 6px;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      background: #FAFAFA;
      color: #555;
      transition: border-color 0.2s, background 0.2s;
    }
    .task-date-input:hover,
    .task-date-input:focus {
      border-color: #4A90D9;
      background: #fff;
    }
    .task-date-input.date-overdue {
      color: #E53935;
      border-color: #FFCDD2;
      background: #FFF5F5;
    }
    .task-date-input.date-today {
      color: #E65100;
      border-color: #FFE0B2;
      background: #FFF8F0;
    }
    .task-date-input.date-future {
      color: #2E7D32;
      border-color: #C8E6C9;
      background: #F1F8E9;
    }
    .date-status {
      font-size: 0.75rem;
      font-weight: 600;
    }
    .date-status.overdue  { color: #E53935; }
    .date-status.today    { color: #E65100; }
    .date-status.future   { color: #2E7D32; }
    .date-status.done     { color: #9E9E9E; }

    .btn-clear-date {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      color: #BDBDBD;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .btn-clear-date:hover { color: #EF5350; }

    /* 완료일 토글 버튼 */
    #date-toggle-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    #date-toggle-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border: 2px solid #E0E0E0;
      border-radius: 20px;
      background: #fff;
      color: #9E9E9E;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    #date-toggle-btn:hover {
      border-color: #4A90D9;
      color: #4A90D9;
    }
    #date-toggle-btn.active {
      border-color: #4A90D9;
      background: #4A90D9;
      color: #fff;
    }
    #date-toggle-btn .toggle-icon {
      font-size: 1rem;
      line-height: 1;
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: #9E9E9E;
      font-size: 1rem;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    /* Footer */
    footer {
      text-align: center;
      padding-bottom: 24px;
    }
    #clear-btn {
      padding: 10px 24px;
      background: #EF5350;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #clear-btn:hover:not(:disabled) { background: #C62828; }
    #clear-btn:disabled {
      background: #E0E0E0;
      color: #9E9E9E;
      cursor: not-allowed;
    }

    /* Mobile */
    @media (max-width: 480px) {
      body { padding: 10px; }
      header h1 { font-size: 1.4rem; }
      #input-area { flex-direction: column; }
      #task-input { min-width: unset; }
      .progress-categories { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 현용의 할일 관리</h1>
    </header>

    <section id="dashboard"></section>

    <nav id="category-tabs">
      <button data-filter="all" class="active">전체</button>
      <button data-filter="work">🏢 업무</button>
      <button data-filter="personal">🏠 개인</button>
      <button data-filter="study">📚 공부</button>
    </nav>

    <section id="input-area">
      <input type="text" id="task-input" maxlength="100" placeholder="할일을 입력하세요...">
      <select id="category-select">
        <option value="work">🏢 업무</option>
        <option value="personal">🏠 개인</option>
        <option value="study">📚 공부</option>
      </select>
      <button id="add-btn">+ 추가</button>
      <span id="auto-hint"></span>
      <div class="input-due-wrap">
        <label for="due-date-input">📅 완료일</label>
        <input type="date" id="due-date-input">
      </div>
    </section>

    <div id="date-toggle-bar">
      <button id="date-toggle-btn" title="완료일 표시/숨기기">
        <span class="toggle-icon">📅</span> 완료일 보기
      </button>
    </div>

    <ul id="task-list"></ul>

    <footer>
      <button id="clear-btn">완료 항목 일괄 삭제</button>
    </footer>
  </div>

  <script>
    // ── 상수 ──────────────────────────────────────────────
    const STORAGE_KEY = 'todoApp_v2_tasks';
    const CAT_NAMES = { work: '업무', personal: '개인', study: '공부' };
    const CAT_ICONS = { work: '🏢', personal: '🏠', study: '📚' };

    // ── 키워드 기반 자동 카테고리 분류 ────────────────────
    const CATEGORY_KEYWORDS = {
      work: [
        '회의','미팅','스탠드업','발표','보고','브리핑','컨퍼런스콜','화상회의',
        '보고서','제안서','계획서','이메일','메일','문서','ppt','엑셀','스프레드시트',
        '슬랙','slack','zoom','줌','지라','jira','노션','confluence',
        '업무','출장','프로젝트','기획','마감','납기','일정','결재','승인','계약',
        '고객','팀','부서','상사','동료','거래처','클라이언트','파트너',
        '배포','릴리즈','스프린트','칸반','온보딩','인터뷰','채용','코드리뷰',
        'pr','풀리퀘','이슈','버그','핫픽스','인프라','서버','운영','모니터링',
        '급여','연봉','인사','평가','kpi','okr','분기','연간'
      ],
      personal: [
        '운동','헬스','요가','필라테스','수영','러닝','조깅','자전거','등산','산책',
        '병원','치과','한의원','약','건강검진','다이어트','스트레칭','명상',
        '청소','빨래','장보기','쇼핑','요리','설거지','분리수거','청구서',
        '택배','이사','집수리','인테리어','가전','가구',
        '친구','가족','부모님','연인','데이트','약속','모임','파티',
        '영화','드라마','유튜브','게임','여행','캠핑','독서','취미',
        '예약','보험','세금','환불','카드','통장','저축','용돈','생일','기념일',
        '여권','비자','운전면허','주민등록','공과금'
      ],
      study: [
        '공부','학습','복습','예습','암기','정리','노트','필기','요약',
        '시험','퀴즈','과제','레포트','논문','발표준비',
        '영어','토익','토플','오픽','일본어','중국어','스페인어',
        '수학','통계','미적분','선형대수',
        '코딩','프로그래밍','알고리즘','자료구조','파이썬','python',
        'javascript','자바스크립트','java','자바','리액트','react',
        'sql','데이터베이스','머신러닝','딥러닝','ai','인공지능',
        '강의','수업','강좌','튜토리얼','인강','유데미','udemy','책','독서',
        '자격증','정보처리기사','컴활','어학','단어','문법','문제풀기'
      ]
    };

    function detectCategory(text) {
      const lower = text.toLowerCase();
      const scores = { work: 0, personal: 0, study: 0 };
      for (const [cat, keywords] of Object.entries(CATEGORY_KEYWORDS)) {
        for (const kw of keywords) {
          if (lower.includes(kw)) scores[cat]++;
        }
      }
      const best = Object.entries(scores).sort((a, b) => b[1] - a[1])[0];
      return best[1] > 0 ? best[0] : null;
    }

    // ── 전역 상태 ──────────────────────────────────────────
    let tasks = loadFromStorage();
    let currentFilter = 'all';

    // ── localStorage 함수 ──────────────────────────────────
    function loadFromStorage() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveToStorage(arr) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }

    // ── 날짜 유틸 ─────────────────────────────────────────
    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    // dateStr(YYYY-MM-DD) 기준 상태 반환
    function dateStatus(dateStr, completed) {
      if (!dateStr) return null;
      if (completed) return 'done';
      const today = todayStr();
      if (dateStr < today) return 'overdue';
      if (dateStr === today) return 'today';
      return 'future';
    }

    // 상태별 텍스트 라벨
    function dateStatusLabel(status) {
      if (status === 'overdue') return '⚠ 기한 초과';
      if (status === 'today')   return '오늘까지';
      if (status === 'future')  return '예정';
      if (status === 'done')    return '완료됨';
      return '';
    }

    // ── CRUD 함수 ──────────────────────────────────────────
    function addTask(text, category, dueDate) {
      const trimmed = text.trim();
      if (!trimmed) { alert('할일 내용을 입력해주세요.'); return; }
      tasks.push({
        id: Date.now().toString(),
        text: trimmed,
        category,
        completed: false,
        createdAt: Date.now(),
        dueDate: dueDate || null
      });
      saveToStorage(tasks);
      document.getElementById('task-input').value = '';
      document.getElementById('due-date-input').value = '';
      document.getElementById('task-input').focus();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveToStorage(tasks);
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
      saveToStorage(tasks);
    }

    function editTask(id, newText) {
      const trimmed = newText.trim();
      if (!trimmed) return;
      tasks = tasks.map(t => t.id === id ? { ...t, text: trimmed } : t);
      saveToStorage(tasks);
    }

    function setDueDate(id, dateStr) {
      tasks = tasks.map(t => t.id === id ? { ...t, dueDate: dateStr || null } : t);
      saveToStorage(tasks);
    }

    // ── 완료일 토글 상태 ───────────────────────────────────
    let showDueDates = false;

    function updateDateToggleBtn() {
      const btn = document.getElementById('date-toggle-btn');
      if (showDueDates) {
        btn.classList.add('active');
        btn.innerHTML = '<span class="toggle-icon">📅</span> 완료일 숨기기';
      } else {
        btn.classList.remove('active');
        btn.innerHTML = '<span class="toggle-icon">📅</span> 완료일 보기';
      }
    }

    // ── 필터 함수 ──────────────────────────────────────────
    function getFilteredTasks() {
      return currentFilter === 'all' ? tasks : tasks.filter(t => t.category === currentFilter);
    }

    // ── 진행률 대시보드 ────────────────────────────────────
    function updateProgress() {
      const dash = document.getElementById('dashboard');
      if (tasks.length === 0) {
        dash.innerHTML = '<p class="empty-dashboard">할일을 추가해서 오늘을 계획해보세요! ✨</p>';
        return;
      }

      const total = tasks.length;
      const done  = tasks.filter(t => t.completed).length;
      const pct   = Math.round((done / total) * 100);
      const isComplete = pct === 100;

      // 기한 초과 카운트
      const overdueCount = tasks.filter(t => !t.completed && t.dueDate && t.dueDate < todayStr()).length;
      const overdueHtml = overdueCount > 0
        ? `<span style="color:#E53935;font-size:0.82rem;font-weight:600;">⚠ 기한 초과 ${overdueCount}건</span>`
        : '';

      const catRows = ['work', 'personal', 'study'].map(cat => {
        const catAll  = tasks.filter(t => t.category === cat);
        const catDone = catAll.filter(t => t.completed).length;
        const catPct  = catAll.length ? Math.round((catDone / catAll.length) * 100) : 0;
        const label   = catAll.length ? `${catDone}/${catAll.length}` : '할일 없음';
        return `
          <div class="cat-progress">
            <div class="cat-progress-label">
              <span>${CAT_ICONS[cat]} ${CAT_NAMES[cat]}</span>
              <span>${label}</span>
            </div>
            <div class="mini-bar-wrap">
              <div class="mini-bar-fill ${cat}" style="width:${catPct}%"></div>
            </div>
          </div>`;
      }).join('');

      dash.innerHTML = `
        <div class="progress-main">
          <div class="progress-label">
            <span>전체 ${done}/${total} (${pct}%)</span>
            ${overdueHtml}
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill ${isComplete ? 'complete' : ''}" style="width:${pct}%"></div>
          </div>
          ${isComplete ? '<p class="congrats">🎉 모든 할일을 완료했습니다!</p>' : ''}
        </div>
        <div class="progress-categories">${catRows}</div>`;
    }

    // ── 렌더링 ────────────────────────────────────────────
    function renderTasks() {
      const list = document.getElementById('task-list');
      const filtered = getFilteredTasks();

      // 탭 카운터 업데이트
      document.querySelectorAll('#category-tabs button').forEach(btn => {
        const filter = btn.dataset.filter;
        const pending = filter === 'all'
          ? tasks.filter(t => !t.completed).length
          : tasks.filter(t => t.category === filter && !t.completed).length;
        const base = filter === 'all' ? '전체'
          : `${CAT_ICONS[filter]} ${CAT_NAMES[filter]}`;
        btn.textContent = pending > 0 ? `${base} (${pending})` : base;
      });

      if (filtered.length === 0) {
        const msg = currentFilter === 'all'
          ? '할일이 없습니다 🎉'
          : `${CAT_NAMES[currentFilter]} 카테고리에 할일이 없습니다.`;
        list.innerHTML = `<li class="empty-state">${msg}</li>`;
        updateProgress();
        updateClearBtn();
        return;
      }

      list.innerHTML = '';
      filtered.forEach(task => {
        const li = document.createElement('li');
        li.className = `task-item${task.completed ? ' completed' : ''}`;
        li.dataset.id = task.id;

        const status = dateStatus(task.dueDate, task.completed);
        const statusLabel = dateStatusLabel(status);
        const dateClass = status ? `task-date-input date-${status}` : 'task-date-input';

        li.innerHTML = `
          <div class="task-main-row">
            <input type="checkbox" ${task.completed ? 'checked' : ''}>
            <span class="task-text${status === 'overdue' ? ' overdue' : ''}">${escapeHtml(task.text)}</span>
            <span class="category-badge ${task.category}">${CAT_NAMES[task.category]}</span>
            <button class="btn-delete">🗑</button>
          </div>
          ${showDueDates ? `
          <div class="task-date-row">
            <label>📅 완료일</label>
            <input
              type="date"
              class="${dateClass}"
              value="${task.dueDate || ''}"
              data-role="due-date">
            ${task.dueDate ? `<button class="btn-clear-date" data-role="clear-date" title="완료일 삭제">✕</button>` : ''}
            ${statusLabel ? `<span class="date-status ${status}">${statusLabel}</span>` : ''}
          </div>` : ''}`;

        list.appendChild(li);
      });

      updateProgress();
      updateClearBtn();
    }

    function updateClearBtn() {
      const btn = document.getElementById('clear-btn');
      btn.disabled = !tasks.some(t => t.completed);
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── 인라인 수정 ────────────────────────────────────────
    function startEdit(li, id, currentText) {
      if (li.classList.contains('completed')) return;

      const span = li.querySelector('.task-text');
      const input = document.createElement('input');
      input.className = 'edit-input';
      input.value = currentText;
      input.maxLength = 100;
      span.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;

      function save() {
        if (saved) return;
        saved = true;
        editTask(id, input.value);
        renderTasks();
      }

      function cancel() {
        if (saved) return;
        saved = true;
        renderTasks();
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') cancel();
      });
      input.addEventListener('blur', save);
    }

    // ── 이벤트 리스너 ─────────────────────────────────────
    document.getElementById('add-btn').addEventListener('click', () => {
      const text    = document.getElementById('task-input').value;
      const cat     = document.getElementById('category-select').value;
      const dueDate = document.getElementById('due-date-input').value;
      addTask(text, cat, dueDate);
      renderTasks();
    });

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('add-btn').click();
    });

    // 실시간 자동 카테고리 감지
    document.getElementById('task-input').addEventListener('input', e => {
      const hint = document.getElementById('auto-hint');
      const detected = detectCategory(e.target.value);
      if (detected) {
        document.getElementById('category-select').value = detected;
        hint.textContent = `✨ 자동 분류: ${CAT_ICONS[detected]} ${CAT_NAMES[detected]}`;
      } else {
        hint.textContent = '';
      }
    });

    // 이벤트 위임: 체크박스 / 삭제 / 완료일 변경 / 완료일 삭제
    document.getElementById('task-list').addEventListener('click', e => {
      const li = e.target.closest('[data-id]');
      if (!li) return;
      const id = li.dataset.id;

      if (e.target.type === 'checkbox') {
        toggleTask(id);
        renderTasks();
      } else if (e.target.classList.contains('btn-delete')) {
        deleteTask(id);
        renderTasks();
      } else if (e.target.dataset.role === 'clear-date') {
        setDueDate(id, null);
        renderTasks();
      }
    });

    // 완료일 날짜 변경 (change 이벤트 위임)
    document.getElementById('task-list').addEventListener('change', e => {
      if (e.target.dataset.role !== 'due-date') return;
      const li = e.target.closest('[data-id]');
      if (!li) return;
      setDueDate(li.dataset.id, e.target.value || null);
      renderTasks();
    });

    // 더블클릭 텍스트 수정
    document.getElementById('task-list').addEventListener('dblclick', e => {
      const span = e.target.closest('.task-text');
      if (!span) return;
      const li = span.closest('[data-id]');
      if (!li) return;
      startEdit(li, li.dataset.id, span.textContent);
    });

    // 카테고리 탭
    document.getElementById('category-tabs').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('#category-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    });

    // 완료일 토글
    document.getElementById('date-toggle-btn').addEventListener('click', () => {
      showDueDates = !showDueDates;
      updateDateToggleBtn();
      renderTasks();
    });

    // 완료 일괄 삭제
    document.getElementById('clear-btn').addEventListener('click', () => {
      tasks = tasks.filter(t => !t.completed);
      saveToStorage(tasks);
      renderTasks();
    });

    // ── 초기화 ────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      renderTasks();
      document.getElementById('task-input').focus();
    });
  </script>
</body>
</html>
