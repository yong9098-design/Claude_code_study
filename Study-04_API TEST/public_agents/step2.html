<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>레시피 생성 — Step 2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      color: #1a202c;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── 스테퍼 ── */
    .stepper {
      width: 100%; background: #fff;
      border-bottom: 1px solid #e5e7eb; padding: 14px 24px;
    }
    .stepper-list {
      list-style: none; display: flex; align-items: center;
      justify-content: center; max-width: 480px; margin: 0 auto;
    }
    .stepper-item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
    .stepper-circle {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      background: #e5e7eb; color: #9ca3af;
    }
    .stepper-label { font-size: 11px; font-weight: 600; color: #9ca3af; white-space: nowrap; }
    .stepper-item.completed .stepper-circle { background: #059669; color: #fff; }
    .stepper-item.completed .stepper-label  { color: #059669; }
    .stepper-item.current .stepper-circle   { background: #4f46e5; color: #fff; box-shadow: 0 0 0 4px #eef2ff; }
    .stepper-item.current .stepper-label    { color: #4f46e5; font-weight: 700; }
    .stepper-connector {
      flex: 1; height: 2px; background: #e5e7eb;
      margin: 0 6px; margin-bottom: 18px;
    }
    .stepper-item.completed + .stepper-connector { background: #059669; }

    /* ── 본문 ── */
    .page-wrap {
      width: 100%; max-width: 700px;
      padding: 40px 16px 60px;
      display: flex; flex-direction: column; gap: 20px;
    }

    header { text-align: center; }
    header h1 { font-size: 26px; font-weight: 800; color: #1e1b4b; }
    header p  { color: #6b7280; margin-top: 6px; font-size: 15px; }

    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 28px;
    }
    .card-title { font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 12px; }

    /* ── 재료 태그 ── */
    .ing-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .ing-tag {
      background: #eef2ff; color: #4338ca;
      border: 1px solid #c7d2fe; border-radius: 999px;
      padding: 5px 14px; font-size: 14px;
    }
    .empty-note { color: #6b7280; font-size: 13px; font-style: italic; }

    /* ── 조건 설정 폼 ── */
    fieldset { border: none; }
    .options-legend {
      font-size: 16px; font-weight: 700; color: #1e1b4b;
      margin-bottom: 20px; display: block;
    }
    .option-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .option-row label { font-size: 14px; font-weight: 600; color: #374151; flex-shrink: 0; }

    /* 인원수 스테퍼 */
    .stepper-ctrl {
      display: flex; align-items: center; gap: 8px;
    }
    .stepper-ctrl button {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid #d1d5db; background: #fff;
      font-size: 18px; cursor: pointer; color: #374151;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, opacity 0.15s;
    }
    .stepper-ctrl button:not(:disabled):hover { border-color: #4f46e5; color: #4f46e5; }
    .stepper-ctrl button:focus-visible { outline: 2px solid #4f46e5; outline-offset: 2px; }
    .stepper-ctrl button:disabled { opacity: 0.35; cursor: not-allowed; }
    .stepper-ctrl output { font-size: 16px; font-weight: 700; color: #1e1b4b; min-width: 40px; text-align: center; }

    /* 칩 라디오 */
    .chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip-radio { cursor: pointer; }
    .chip-radio input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .chip-radio span {
      display: inline-block; padding: 7px 16px;
      border: 1.5px solid #d1d5db; border-radius: 999px;
      font-size: 14px; font-weight: 500; color: #6b7280;
      background: #fff; transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .chip-radio input:checked + span {
      border-color: #4f46e5; background: #eef2ff;
      color: #4f46e5; font-weight: 700;
    }
    .chip-radio input:focus-visible + span { box-shadow: 0 0 0 3px #c7d2fe; }

    /* 카테고리 select */
    .option-select {
      padding: 8px 12px; border: 1.5px solid #d1d5db; border-radius: 8px;
      font-size: 14px; color: #374151; background: #fff; outline: none;
      cursor: pointer; min-height: 44px;
    }
    .option-select:focus { border-color: #4f46e5; }

    /* ── 버튼 ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: none; border-radius: 10px; cursor: pointer;
      font-size: 15px; font-weight: 700; padding: 0 20px; min-height: 48px;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:focus-visible { box-shadow: 0 0 0 3px #c7d2fe; outline: none; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: #4f46e5; color: #fff; width: 100%; }
    .btn-primary:not(:disabled):hover { background: #4338ca; }
    .btn-secondary { background: #e0e7ff; color: #4338ca; width: 100%; margin-top: 10px; }
    .btn-secondary:hover { background: #c7d2fe; }
    .btn-gray { background: #e5e7eb; color: #374151; }
    .btn-gray:hover { background: #d1d5db; }

    .spinner {
      width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 스켈레톤 ── */
    #skeleton-cards { display: none; }
    .skeleton-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 22px; margin-bottom: 16px;
    }
    .skel {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      border-radius: 6px;
    }
    /* shimmer는 로딩 중에만 활성화 (body.is-loading 클래스로 제어) */
    body.is-loading .skel { animation: shimmer 1.4s infinite; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-badge { height: 22px; width: 52px; border-radius: 999px; margin-bottom: 12px; }
    .skel-title { height: 20px; width: 60%; margin-bottom: 8px; }
    .skel-text  { height: 14px; width: 90%; margin-bottom: 6px; }
    .skel-text2 { height: 14px; width: 70%; margin-bottom: 14px; }
    .skel-btn   { height: 40px; width: 100%; border-radius: 8px; }

    /* ── 레시피 그리드 ── */
    #recipe-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    /* 빈 상태는 list 외부에 위치 */
    #empty-recipes {
      color: #6b7280; font-size: 13px; font-style: italic;
      padding: 16px 0;
    }
    .recipe-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 22px; display: flex; flex-direction: column; gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .recipe-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.11); }

    .rc-header { display: flex; align-items: flex-start; justify-content: space-between; }
    .rc-badges { display: flex; gap: 6px; align-items: center; }
    .badge {
      font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px;
    }
    .badge-easy   { background: #d1fae5; color: #065f46; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-hard   { background: #fee2e2; color: #991b1b; }
    .badge-time   { background: #f3f4f6; color: #6b7280; display: flex; align-items: center; gap: 4px; }

    .rc-save-btn {
      background: none; border: none; cursor: pointer;
      color: #d1d5db; border-radius: 6px;
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s;
    }
    .rc-save-btn:hover, .rc-save-btn[aria-pressed="true"] { color: #4f46e5; }
    .rc-save-btn[aria-pressed="true"] svg { fill: #4f46e5; }
    .rc-save-btn:focus-visible { box-shadow: 0 0 0 3px #c7d2fe; outline: none; }

    .rc-name    { font-size: 17px; font-weight: 700; color: #1e1b4b; }
    .rc-summary { font-size: 13px; color: #6b7280; line-height: 1.5; }

    .rc-ing-preview { display: flex; gap: 6px; flex-wrap: wrap; }
    .ing-chip {
      background: #f3f4f6; border: 1px solid #e5e7eb;
      border-radius: 6px; padding: 3px 8px; font-size: 12px; color: #374151;
    }
    .ing-chip-more {
      background: #eef2ff; color: #4338ca;
      border-radius: 6px; padding: 3px 8px; font-size: 12px; font-weight: 600;
    }

    .rc-detail-btn {
      margin-top: auto; background: #eef2ff; color: #4338ca;
      border: none; border-radius: 8px; padding: 0 16px; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s; min-height: 44px;
    }
    .rc-detail-btn:hover { background: #c7d2fe; }
    .rc-detail-btn:focus-visible { box-shadow: 0 0 0 3px #c7d2fe; outline: none; }

    /* ── 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto;
      padding: 32px;
    }
    .modal-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 22px; font-weight: 800; color: #1e1b4b; }
    .modal-close {
      background: none; border: none; cursor: pointer; color: #9ca3af;
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; transition: color 0.15s;
    }
    .modal-close:hover { color: #1a202c; }
    .modal-close:focus-visible { box-shadow: 0 0 0 3px #c7d2fe; outline: none; }
    .modal-meta { display: flex; gap: 12px; margin-bottom: 18px; font-size: 13px; color: #6b7280; align-items: center; }
    .section-label {
      font-size: 13px; font-weight: 700; color: #374151;
      margin: 18px 0 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .modal-ing-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .modal-ing-chip {
      background: #f3f4f6; border: 1px solid #e5e7eb;
      border-radius: 6px; padding: 4px 10px; font-size: 13px; color: #374151;
    }
    .step-list { list-style: none; }
    .step-list li { display: flex; gap: 12px; margin-bottom: 10px; font-size: 14px; color: #374151; }
    .step-num {
      width: 24px; height: 24px; background: #eef2ff; color: #4338ca;
      border-radius: 50%; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .tip-box {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #92400e; margin-top: 14px;
    }
    .modal-footer { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
    .modal-footer .btn { flex: 1; }

    /* ── 토스트 ── */
    #toast-container {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; flex-direction: column; gap: 8px;
      min-width: 280px; max-width: 360px; width: calc(100% - 32px);
    }
    .toast {
      border-radius: 10px; padding: 12px 16px;
      font-size: 14px; font-weight: 500; line-height: 1.5;
      display: flex; align-items: flex-start; gap: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12); animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .toast-error   { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
    .toast-success { background: #d1fae5; border: 1px solid #6ee7b7; color: #065f46; }
    .toast-info    { background: #eef2ff; border: 1px solid #c7d2fe; color: #3730a3; }
    .toast-icon  { font-weight: 700; flex-shrink: 0; }
    .toast-close { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 18px; line-height: 1; padding: 0; opacity: 0.6; flex-shrink: 0; }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      .page-wrap { padding: 24px 12px 60px; }
      #recipe-cards { grid-template-columns: 1fr; }
      .option-row { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>

<!-- 스테퍼 -->
<nav class="stepper" aria-label="진행 단계">
  <ol class="stepper-list">
    <li class="stepper-item completed" aria-label="1단계 재료 인식, 완료">
      <span class="stepper-circle" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M3 8l3.5 3.5L13 4.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="stepper-label">재료 인식</span>
    </li>
    <li class="stepper-connector" aria-hidden="true"></li>
    <li class="stepper-item current" aria-current="step" aria-label="2단계 레시피 생성, 현재 단계">
      <span class="stepper-circle" aria-hidden="true">2</span>
      <span class="stepper-label">레시피 생성</span>
    </li>
    <li class="stepper-connector" aria-hidden="true"></li>
    <li class="stepper-item" aria-label="3단계 내 레시피, 미완료">
      <span class="stepper-circle" aria-hidden="true">3</span>
      <span class="stepper-label">내 레시피</span>
    </li>
  </ol>
</nav>

<div class="page-wrap">
  <header>
    <h1>레시피 생성</h1>
    <p>AI가 재료와 조건에 맞는 레시피를 추천해 드려요.</p>
  </header>

  <!-- 인식된 재료 -->
  <div class="card">
    <div class="card-title">인식된 재료</div>
    <div class="ing-tags" id="ing-tags" role="list" aria-label="Step 1에서 인식된 재료 목록"></div>
  </div>

  <!-- 조건 설정 -->
  <div class="card">
    <fieldset>
      <legend class="options-legend">레시피 조건 설정</legend>

      <div class="option-row">
        <label id="servings-label">인원수</label>
        <div class="stepper-ctrl" role="group" aria-labelledby="servings-label">
          <button type="button" id="servings-dec" aria-label="인원수 줄이기" disabled>−</button>
          <output id="servings-out" aria-live="polite">2명</output>
          <button type="button" id="servings-inc" aria-label="인원수 늘리기">+</button>
        </div>
      </div>

      <div class="option-row">
        <label id="time-label">요리 시간</label>
        <div class="chip-group" role="radiogroup" aria-labelledby="time-label">
          <label class="chip-radio">
            <input type="radio" name="time" value="15" />
            <span>15분</span>
          </label>
          <label class="chip-radio">
            <input type="radio" name="time" value="30" checked />
            <span>30분</span>
          </label>
          <label class="chip-radio">
            <input type="radio" name="time" value="60" />
            <span>60분</span>
          </label>
        </div>
      </div>

      <div class="option-row">
        <label for="category">카테고리</label>
        <select id="category" class="option-select">
          <option value="전체">전체</option>
          <option value="한식">한식</option>
          <option value="양식">양식</option>
          <option value="중식">중식</option>
          <option value="일식">일식</option>
          <option value="간식">간식</option>
        </select>
      </div>
    </fieldset>

    <button type="button" id="generate-btn" class="btn btn-primary">
      레시피 생성하기
    </button>
  </div>

  <!-- 스켈레톤 로딩 -->
  <div id="skeleton-cards">
    <div class="skeleton-card">
      <div class="skel skel-badge"></div>
      <div class="skel skel-title"></div>
      <div class="skel skel-text"></div>
      <div class="skel skel-text2"></div>
      <div class="skel skel-btn"></div>
    </div>
    <div class="skeleton-card">
      <div class="skel skel-badge"></div>
      <div class="skel skel-title"></div>
      <div class="skel skel-text"></div>
      <div class="skel skel-text2"></div>
      <div class="skel skel-btn"></div>
    </div>
    <div class="skeleton-card">
      <div class="skel skel-badge"></div>
      <div class="skel skel-title"></div>
      <div class="skel skel-text"></div>
      <div class="skel skel-text2"></div>
      <div class="skel skel-btn"></div>
    </div>
  </div>

  <!-- 레시피 카드 (role="list"), 빈 상태는 외부에 분리 -->
  <div id="recipe-cards" role="list" aria-label="생성된 레시피 목록"></div>
  <p id="empty-recipes" hidden>생성된 레시피가 없습니다. 다시 시도해주세요.</p>

  <!-- 재생성 버튼 -->
  <button type="button" id="regen-btn" class="btn btn-secondary" hidden>
    🔄 다른 레시피 추천받기
  </button>

  <!-- 스크린리더 알림 -->
  <div id="sr-announce" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
</div>

<!-- 레시피 상세 모달 -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" id="modal-close" aria-label="모달 닫기" type="button">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="section-label">재료</div>
    <div class="modal-ing-list" id="modal-ings"></div>
    <div class="section-label">조리 순서</div>
    <ol class="step-list" id="modal-steps"></ol>
    <div id="modal-tip"></div>
    <div class="modal-footer">
      <button type="button" class="btn btn-primary" id="modal-save-btn">프로필에 저장</button>
      <button type="button" class="btn btn-gray" id="modal-close-btn">닫기</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<script>
  // ── 토스트 (텍스트 전용 — XSS 방지) ──────────────────────────
  function showToast(message, type = 'error', duration = 4000) {
    const container = document.getElementById('toast-container');
    while (container.children.length >= 3) container.firstChild.remove();
    const toast = document.createElement('div');
    const icons = { error: '!', success: '✓', info: 'i' };
    toast.setAttribute('role', type === 'error' ? 'alert' : 'status');
    toast.className = `toast toast-${type}`;

    const icon = document.createElement('span');
    icon.className = 'toast-icon';
    icon.setAttribute('aria-hidden', 'true');
    icon.textContent = icons[type] || '!';

    const text = document.createElement('span');
    text.textContent = message;

    const closeBtn = document.createElement('button');
    closeBtn.setAttribute('aria-label', '알림 닫기');
    closeBtn.className = 'toast-close';
    closeBtn.style.color = 'inherit';
    closeBtn.textContent = '×';

    toast.appendChild(icon);
    toast.appendChild(text);
    toast.appendChild(closeBtn);
    container.appendChild(toast);

    const timer = setTimeout(() => toast.remove(), duration);
    closeBtn.addEventListener('click', () => { clearTimeout(timer); toast.remove(); });
  }

  // ── 상태 ─────────────────────────────────────────────────────
  // sessionStorage 우선, URL params 폴백 (하위 호환)
  const ingredients = (() => {
    try {
      const stored = sessionStorage.getItem('ingredients');
      if (stored) return JSON.parse(stored);
      return JSON.parse(new URLSearchParams(location.search).get('ingredients') || '[]');
    } catch { return []; }
  })();

  let servings = 2;
  const MIN_SERVINGS = 1;
  const MAX_SERVINGS = 6;
  let activeRecipe = null;
  let generatedRecipes = [];

  // ── 재료 표시 (DOM API — XSS 방지) ──────────────────────────
  const tagsEl = document.getElementById('ing-tags');
  if (ingredients.length > 0) {
    ingredients.forEach(ing => {
      const span = document.createElement('span');
      span.className = 'ing-tag';
      span.setAttribute('role', 'listitem');
      span.textContent = ing;
      tagsEl.appendChild(span);
    });
  } else {
    const note = document.createElement('span');
    note.className = 'empty-note';
    note.textContent = '전달된 재료가 없습니다. ';
    const link = document.createElement('a');
    link.href = '/';
    link.textContent = 'Step 1에서 재료를 인식해주세요.';
    note.appendChild(link);
    tagsEl.appendChild(note);
  }

  // ── 인원수 스테퍼 (경계값 비활성 처리) ──────────────────────
  const servingsOut = document.getElementById('servings-out');
  const decBtn = document.getElementById('servings-dec');
  const incBtn = document.getElementById('servings-inc');

  function updateServingsUI() {
    servingsOut.value = `${servings}명`;
    decBtn.disabled = servings <= MIN_SERVINGS;
    incBtn.disabled = servings >= MAX_SERVINGS;
  }
  // 초기 상태 적용 (servings=2이므로 dec 활성, inc 활성)
  updateServingsUI();

  decBtn.addEventListener('click', () => {
    if (servings > MIN_SERVINGS) { servings--; updateServingsUI(); }
  });
  incBtn.addEventListener('click', () => {
    if (servings < MAX_SERVINGS) { servings++; updateServingsUI(); }
  });

  // ── 레시피 생성 ──────────────────────────────────────────────
  const generateBtn = document.getElementById('generate-btn');
  const regenBtn    = document.getElementById('regen-btn');
  const skeleton    = document.getElementById('skeleton-cards');
  const cardsEl     = document.getElementById('recipe-cards');
  const emptyRecipesEl = document.getElementById('empty-recipes');
  const srAnnounce  = document.getElementById('sr-announce');

  async function generateRecipes() {
    if (ingredients.length === 0) {
      showToast('재료가 없어요. Step 1로 돌아가 재료를 인식해주세요.', 'error');
      return;
    }

    const timeVal = document.querySelector('input[name="time"]:checked')?.value || '30';
    const category = document.getElementById('category').value;

    setLoading(true);
    cardsEl.innerHTML = '';
    emptyRecipesEl.hidden = true;
    regenBtn.hidden = true;
    srAnnounce.textContent = 'AI가 레시피를 생성하고 있습니다. 잠시 기다려주세요.';

    try {
      const res = await fetch('/api/generate-recipes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ingredients,
          options: { servings, max_time_minutes: parseInt(timeVal), category },
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '레시피 생성에 실패했습니다.');

      generatedRecipes = data.recipes || [];
      renderRecipeCards(generatedRecipes);
      regenBtn.hidden = false;
      srAnnounce.textContent = `${generatedRecipes.length}개의 레시피를 생성했습니다.`;
    } catch (err) {
      showToast(err.message, 'error');
      srAnnounce.textContent = '레시피 생성에 실패했습니다.';
    } finally {
      setLoading(false);
    }
  }

  generateBtn.addEventListener('click', generateRecipes);
  regenBtn.addEventListener('click', generateRecipes);

  function setLoading(on) {
    if (on) {
      generateBtn.disabled = true;
      generateBtn.setAttribute('aria-busy', 'true');
      generateBtn.innerHTML = '<div class="spinner" aria-hidden="true"></div> 레시피 생성 중...';
      skeleton.style.display = 'block';
      document.body.classList.add('is-loading');
    } else {
      generateBtn.disabled = false;
      generateBtn.removeAttribute('aria-busy');
      generateBtn.textContent = '레시피 생성하기';
      skeleton.style.display = 'none';
      document.body.classList.remove('is-loading');
    }
  }

  function diffClass(d) {
    if (d === '쉬움') return 'badge-easy';
    if (d === '어려움') return 'badge-hard';
    return 'badge-medium';
  }

  // ── 레시피 카드 렌더링 (DOM API — XSS 방지) ──────────────────
  function renderRecipeCards(recipes) {
    cardsEl.innerHTML = '';
    emptyRecipesEl.hidden = true;

    if (recipes.length === 0) {
      emptyRecipesEl.hidden = false;
      return;
    }

    recipes.forEach(r => {
      const card = document.createElement('article');
      card.setAttribute('role', 'listitem');
      card.className = 'recipe-card';
      card.setAttribute('aria-label', `${r.name} 레시피`);

      // 헤더 (배지 + 저장 버튼)
      const header = document.createElement('div');
      header.className = 'rc-header';

      const badges = document.createElement('div');
      badges.className = 'rc-badges';

      const diffBadge = document.createElement('span');
      diffBadge.className = `badge ${diffClass(r.difficulty)}`;
      diffBadge.textContent = r.difficulty || '보통';

      const timeBadge = document.createElement('span');
      timeBadge.className = 'badge badge-time';
      timeBadge.textContent = `⏱ ${r.time_minutes}분`;

      badges.appendChild(diffBadge);
      badges.appendChild(timeBadge);

      const saveBtn = document.createElement('button');
      saveBtn.type = 'button';
      saveBtn.className = 'rc-save-btn';
      saveBtn.setAttribute('aria-label', `${r.name} 저장`);
      saveBtn.setAttribute('aria-pressed', 'false');
      saveBtn.dataset.id = String(r.id);
      saveBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 3h14a1 1 0 011 1v17l-8-4-8 4V4a1 1 0 011-1z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>`;

      header.appendChild(badges);
      header.appendChild(saveBtn);
      card.appendChild(header);

      // 요리명
      const name = document.createElement('div');
      name.className = 'rc-name';
      name.textContent = r.name;
      card.appendChild(name);

      // 한 줄 소개
      const summary = document.createElement('div');
      summary.className = 'rc-summary';
      summary.textContent = r.summary || '';
      card.appendChild(summary);

      // 재료 미리보기
      const ingPreview = document.createElement('div');
      ingPreview.className = 'rc-ing-preview';
      const previewIngs = (r.ingredients || []).slice(0, 3);
      const moreCount = Math.max(0, (r.ingredients || []).length - 3);
      previewIngs.forEach(i => {
        const chip = document.createElement('span');
        chip.className = 'ing-chip';
        chip.textContent = i.name;
        ingPreview.appendChild(chip);
      });
      if (moreCount > 0) {
        const more = document.createElement('span');
        more.className = 'ing-chip-more';
        more.textContent = `+${moreCount}`;
        ingPreview.appendChild(more);
      }
      card.appendChild(ingPreview);

      // 상세 버튼
      const detailBtn = document.createElement('button');
      detailBtn.type = 'button';
      detailBtn.className = 'rc-detail-btn';
      detailBtn.dataset.id = String(r.id);
      detailBtn.innerHTML = `자세한 조리법 보기 <svg width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>`;

      card.appendChild(detailBtn);
      cardsEl.appendChild(card);
    });
  }

  // ── 이벤트 위임 (카드 목록 — 리스너 수 고정) ─────────────────
  cardsEl.addEventListener('click', e => {
    const saveBtn = e.target.closest('.rc-save-btn');
    if (saveBtn) {
      e.stopPropagation();
      const recipe = generatedRecipes.find(r => String(r.id) === saveBtn.dataset.id);
      if (recipe) saveRecipe(recipe, saveBtn);
      return;
    }
    const detailBtn = e.target.closest('.rc-detail-btn');
    if (detailBtn) {
      const recipe = generatedRecipes.find(r => String(r.id) === detailBtn.dataset.id);
      if (recipe) openModal(recipe);
    }
  });

  // ── 레시피 저장 ──────────────────────────────────────────────
  async function saveRecipe(recipe, btn) {
    const profileId = localStorage.getItem('profileId');
    if (!profileId) {
      showToast('저장하려면 먼저 프로필을 만들어야 해요. profile.html에서 프로필을 만들어주세요.', 'info', 5000);
      return;
    }
    btn.disabled = true;
    try {
      const res = await fetch(`/api/profile/${profileId}/recipes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ recipe, source_image_ingredients: ingredients }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '저장에 실패했습니다.');
      btn.setAttribute('aria-pressed', 'true');
      btn.setAttribute('aria-label', `${recipe.name} 저장됨`);
      showToast(`"${recipe.name}" 레시피가 저장됐어요!`, 'success');
    } catch (err) {
      btn.disabled = false;
      showToast(err.message, 'error');
    }
  }

  // ── 모달 (DOM API — XSS 방지) ────────────────────────────────
  function openModal(recipe) {
    activeRecipe = recipe;
    document.getElementById('modal-title').textContent = recipe.name;

    // 메타 (시간 + 난이도)
    const metaEl = document.getElementById('modal-meta');
    metaEl.innerHTML = '';
    const timeSpan = document.createElement('span');
    timeSpan.textContent = `⏱ ${recipe.time_minutes}분`;
    const diffBadge = document.createElement('span');
    diffBadge.className = `badge ${diffClass(recipe.difficulty)}`;
    diffBadge.style.margin = '0';
    diffBadge.textContent = recipe.difficulty || '보통';
    metaEl.appendChild(timeSpan);
    metaEl.appendChild(diffBadge);

    // 재료
    const ingsEl = document.getElementById('modal-ings');
    ingsEl.innerHTML = '';
    (recipe.ingredients || []).forEach(i => {
      const chip = document.createElement('span');
      chip.className = 'modal-ing-chip';
      chip.textContent = i.name;
      if (i.amount) {
        const amt = document.createElement('span');
        amt.style.color = '#9ca3af';
        amt.textContent = ` ${i.amount}`;
        chip.appendChild(amt);
      }
      ingsEl.appendChild(chip);
    });

    // 조리 순서
    const stepsEl = document.getElementById('modal-steps');
    stepsEl.innerHTML = '';
    (recipe.steps || []).forEach((s, idx) => {
      const li = document.createElement('li');
      const numSpan = document.createElement('span');
      numSpan.className = 'step-num';
      numSpan.textContent = idx + 1;
      const textSpan = document.createElement('span');
      textSpan.textContent = s;
      li.appendChild(numSpan);
      li.appendChild(textSpan);
      stepsEl.appendChild(li);
    });

    // 팁
    const tipEl = document.getElementById('modal-tip');
    tipEl.innerHTML = '';
    if (recipe.tip) {
      const tipBox = document.createElement('div');
      tipBox.className = 'tip-box';
      tipBox.textContent = `💡 ${recipe.tip}`;
      tipEl.appendChild(tipBox);
    }

    const overlay = document.getElementById('modal-overlay');
    overlay.classList.add('open');

    requestAnimationFrame(() => {
      const first = overlay.querySelector('button:not([disabled]), [href], input, [tabindex]:not([tabindex="-1"])');
      if (first) first.focus();
    });

    overlay._onKey = e => {
      if (e.key === 'Escape') { closeModal(); return; }
      if (e.key !== 'Tab') return;
      const focusables = [...overlay.querySelectorAll(
        'button:not([disabled]), [href], input, [tabindex]:not([tabindex="-1"])'
      )];
      const first = focusables[0], last = focusables[focusables.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    };
    document.addEventListener('keydown', overlay._onKey);
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('open');
    document.removeEventListener('keydown', overlay._onKey);
    document.body.style.overflow = '';
    activeRecipe = null;
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  // 모달 내 저장 버튼
  document.getElementById('modal-save-btn').addEventListener('click', () => {
    if (!activeRecipe) return;
    saveRecipe(activeRecipe, document.getElementById('modal-save-btn'));
  });
</script>
</body>
</html>
